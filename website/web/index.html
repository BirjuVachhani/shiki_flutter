  <script>
    // Remove the branded loader once Flutter renders. Arms a MutationObserver
    // before the engine boots, waits two frames after the flutter view is
    // injected (so the first paint lands before we fade), then fades + removes.
    (function () {
      var loader = document.getElementById('loading');
      if (!loader) return;
      var done = false, obs;
      function hide() {
        if (done) return;
        done = true;
        if (obs) obs.disconnect();
        loader.classList.add('loaded');
        setTimeout(function () { loader.remove(); }, 400);
      }
      obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane, flt-scene-host')) {
          requestAnimationFrame(function () { requestAnimationFrame(hide); });
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(hide, 15000); // fallback: never leave the loader stuck
    })();
  </script>
