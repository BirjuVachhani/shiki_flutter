name: shiki_flutter_website

description: "Showcase website for the shiki_flutter package."

publish_to: none

version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  shiki_flutter:
    path: ../packages/shiki_flutter

  # The native Oniguruma engine (dart:ffi on IO, WebAssembly on web). The site
  # uses it as the IO engine (see lib/src/highlight/engine_config_io.dart); on
  # web a conditional import keeps it out of the build. Also drives the engine
  # benchmarks under integration_test/.
  shiki_flutter_native_engine:
    path: ../packages/shiki_flutter_native_engine

  go_router: ^17.3.0
  url_launcher: ^6.3.2
  simple_icons: ^16.23.0
  recase: ^4.1.0
  flutter_svg: ^2.3.0

  # Browser interop for the docs "Copy as Markdown" control: fetch the served
  # web/docs.md and trigger a download. Web-only (guarded behind a conditional
  # import), so it never enters the IO/desktop build.
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-400.ttf
          weight: 400
        - asset: assets/fonts/Geist-500.ttf
          weight: 500
        - asset: assets/fonts/Geist-600.ttf
          weight: 600
        - asset: assets/fonts/Geist-700.ttf
          weight: 700
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-400.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-500.ttf
          weight: 500
        - asset: assets/fonts/GeistMono-700.ttf
          weight: 700
