name: shiki_flutter_ffi_engine

description: >-
  Native (FFI Oniguruma) engine backend for shiki_flutter. Set
  `ShikiHighlighter.engine = ShikiHighlighterFFIEngine()` in main() to tokenize
  with the real Oniguruma C library instead of the pure-Dart engine. IO
  platforms only; on web, guard with kIsWeb and keep the pure-Dart default.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_ffi_engine
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_ffi_engine

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shiki_flutter: ^1.0.0
  oniguruma:  ^1.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
