  supports.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_native_engine
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_native_engine

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shiki_flutter_engine_interface: ^1.0.0
  oniguruma_native: ^1.0.1+2
  shiki_flutter: ^1.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  test: ^1.31.0
  shiki_flutter_dart_engine: ^1.0.0
