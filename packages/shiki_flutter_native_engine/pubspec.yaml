name: shiki_flutter_native_engine

description: >-
  Native Oniguruma engine backend for shiki_flutter: the real C library via
  dart:ffi on IO and WebAssembly on web, on every platform oniguruma_native
  supports.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_native_engine
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_native_engine

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  shiki_flutter_engine_interface: ^1.0.0
  oniguruma_native: ^1.0.1+2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  # Maintainer-only: `tool/tokenize_worker_entry_native.dart` reuses the core
  # package's shared `runTokenizeWorker` loop to compile the prebuilt web worker.
  # The entry lives in `tool/` (never `lib/`), so this stays a dev dependency and
  # apps depending on this package pull in neither the core package nor Flutter.
  shiki_flutter: ^1.0.0
  shiki_flutter_dart_engine: ^1.0.0
