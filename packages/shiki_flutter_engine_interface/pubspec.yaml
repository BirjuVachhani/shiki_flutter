name: shiki_flutter_engine_interface

description: >-
  The regex-engine seam shared by shiki_flutter and its engine backends: the
  ShikiHighlighterEngine factory plus the OnigScanner / OnigString / OnigMatch
  contract the TextMate tokenizer runs on. Pure Dart with no dependencies, so
  every engine implementation can depend on it and interoperate.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_engine_interface
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_engine_interface

resolution: workspace

environment:
  sdk: ^3.12.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
