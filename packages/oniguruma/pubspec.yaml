name: oniguruma

description: >-
  Dart FFI bindings to the Oniguruma regular-expression library via Dart build
  hooks (native assets): bundles a prebuilt library when one ships for the
  target, otherwise downloads and compiles the pinned source (SHA-256 verified).
  IO platforms only for now; a WebAssembly backend for the web is planned.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/oniguruma
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/oniguruma

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  ffi: ^2.2.0
  hooks: ^2.1.0
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.3
  archive: ^4.0.9
  crypto: ^3.0.7

dependency_overrides:
  meta: ^1.18.0

dev_dependencies:
  test: ^1.31.0
