name: oniguruma

description: >-
  Dart FFI bindings to the Oniguruma regular-expression library via Dart build
  hooks (native assets): bundles a prebuilt library when one ships for the
  target, otherwise downloads and compiles the pinned source (SHA-256 verified).
  IO platforms only for now; a WebAssembly backend for the web is planned.

version: 0.1.0

# Resolved as part of the pub workspace rooted at the repository root.
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  ffi: ^2.2.0

  # Build-hook toolchain. The hook bundles a prebuilt library when one ships
  # for the target (prebuilt/), otherwise downloads the pinned Oniguruma source
  # release, verifies its SHA-256, and compiles it with native_toolchain_c.
  hooks: ^2.1.0
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.3
  archive: ^4.0.0 # extract the downloaded source tarball (source fallback)
  crypto: ^3.0.0 # SHA-256 verify the downloaded tarball (source fallback)

dependency_overrides:
  meta: ^1.18.0

dev_dependencies:
  test: ^1.31.0
