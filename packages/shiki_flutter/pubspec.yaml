name: shiki_flutter
description: >-
  A TextMate-grammar based syntax highlighter for Flutter, ported from Shiki.
  Tokenizes source code with real TextMate grammars and Shiki themes and renders
  it as styled TextSpans.

version: 1.0.1

homepage: https://shiki.birju.dev
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter

resolution: workspace

environment:
  sdk: ^3.12.0
  # Wide-gamut color support (Color.from + ColorSpace.displayP3, used to render
  # `color(display-p3 ...)` theme colors) landed in Flutter 3.27.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  shiki_flutter_engine_interface: ^1.0.0
  shiki_flutter_dart_engine: ^1.0.0
  meta: ">=1.18.0 <2.0.0"
  web: ">=1.1.0 <1.2.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

topics:
  - syntax-highlighting
  - textmate
  - themes
  - highlighting
  - code