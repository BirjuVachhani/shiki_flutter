name: shiki_flutter
description: >-
  A TextMate-grammar based syntax highlighter for Flutter, ported from Shiki.
  Tokenizes source code with VS Code themes and renders it as styled TextSpans.

version: 0.1.0

homepage: https://github.com/BirjuVachhani/shiki_flutter
repository: https://github.com/BirjuVachhani/shiki_flutter

resolution: workspace

environment:
  sdk: ^3.12.2
  # Wide-gamut color support (Color.from + ColorSpace.displayP3, used to render
  # `color(display-p3 ...)` theme colors) landed in Flutter 3.27.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
