name: shiki_flutter_dart_engine

description: >-
  Pure-Dart Oniguruma engine backend for shiki_flutter (via the oniguruma_dart
  port): no FFI, no native build, runs everywhere including web. shiki_flutter
  uses it (ShikiHighlighterDartEngine) as its default engine on native/VM.

version: 1.0.0

homepage: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_dart_engine
repository: https://github.com/BirjuVachhani/shiki_flutter/tree/main/packages/shiki_flutter_dart_engine

resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shiki_flutter_engine_interface: ^1.0.0
  oniguruma_dart: ^1.0.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
